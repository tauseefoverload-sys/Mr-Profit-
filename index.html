<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Profit Official | Crypto Market Analyst</title>
  <meta name="description" content="Bitcoin & Altcoin Research. Market insights, structured analysis, and macro-driven crypto research by Mr Profit Official." />
  <meta name="keywords" content="crypto analyst, bitcoin analysis, altcoin research, crypto market insights, Mr Profit Official" />
  <meta property="og:title" content="Mr Profit Official | Crypto Market Analyst" />
  <meta property="og:description" content="Market insights, structured analysis, and macro-driven crypto research." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b0f;
      --bg2: #0d1117;
      --bg3: #111820;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.12);
      --green: #00ff88;
      --green2: #00cc6a;
      --green-dim: rgba(0,255,136,0.12);
      --orange: #f7931a;
      --orange2: #e07e0e;
      --orange-dim: rgba(247,147,26,0.12);
      --text: #e8edf3;
      --text2: #8b96a5;
      --text3: #5a6472;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green2); border-radius: 2px; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(8,11,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--green); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text2);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }

    .nav-cta {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--green);
      border: none;
      padding: 10px 22px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-cta:hover { background: var(--green2); transform: translateY(-1px); }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all 0.3s;
    }

    /* Mobile nav */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 61px; left: 0; right: 0;
      background: rgba(8,11,15,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 99;
      padding: 24px 48px;
      flex-direction: column;
      gap: 20px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .mobile-nav a:hover { color: var(--green); }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 48px 80px;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,255,136,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero-glow2 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(247,147,26,0.06) 0%, transparent 70%);
      bottom: 10%; right: 10%;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.2);
      padding: 6px 14px;
      margin-bottom: 28px;
      animation: fadeDown 0.8s ease both;
    }
    .hero-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .hero-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(42px, 5vw, 68px);
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      animation: fadeUp 0.9s ease 0.1s both;
    }
    .hero-title .accent { color: var(--green); }
    .hero-title .accent2 { color: var(--orange); }

    .hero-subtitle {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 24px;
      animation: fadeUp 0.9s ease 0.2s both;
    }

    .hero-desc {
      font-size: 17px;
      font-weight: 300;
      color: var(--text2);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 40px;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      animation: fadeUp 0.9s ease 0.4s both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--green);
      border: none;
      padding: 14px 28px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-primary:hover::after { opacity: 1; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,136,0.2); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      background: transparent;
      border: 1px solid var(--border2);
      padding: 14px 28px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--green); color: var(--green); transform: translateY(-2px); }

    .btn-orange {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--orange);
      border: none;
      padding: 14px 28px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-orange:hover { background: var(--orange2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,147,26,0.2); }

    /* Hero Terminal */
    .hero-terminal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      overflow: hidden;
      animation: fadeLeft 1s ease 0.3s both;
    }

    .terminal-bar {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .terminal-dots { display: flex; gap: 6px; }
    .terminal-dots span { width: 10px; height: 10px; border-radius: 50%; }
    .terminal-dots span:nth-child(1) { background: #ff5f57; }
    .terminal-dots span:nth-child(2) { background: #febc2e; }
    .terminal-dots span:nth-child(3) { background: #28c840; }
    .terminal-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.06em;
      margin-left: 8px;
    }

    .terminal-body {
      padding: 24px 22px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 2;
    }
    .t-line { display: flex; gap: 10px; }
    .t-prompt { color: var(--green); user-select: none; }
    .t-key { color: var(--text3); }
    .t-val { color: var(--text); }
    .t-val.green { color: var(--green); }
    .t-val.orange { color: var(--orange); }
    .t-val.dim { color: var(--text2); font-weight: 300; }
    .t-comment { color: var(--text3); font-size: 12px; }
    .t-cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--green);
      vertical-align: middle;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .terminal-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    /* ─── SECTION COMMON ─── */
    section { position: relative; z-index: 1; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px;
    }

    .section-pad { padding: 100px 0; }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 20px;
    }
    .section-tag::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--green);
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(28px, 3.5vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.7;
      max-width: 560px;
    }

    /* ─── ABOUT ─── */
    #about { background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 80px;
      align-items: center;
    }

    .about-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      padding: 36px;
      position: relative;
    }
    .about-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to bottom, var(--green), var(--orange));
    }

    .about-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-dim), var(--orange-dim));
      border: 2px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--green);
    }

    .about-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .about-role {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .about-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 1px solid var(--border2);
      color: var(--text2);
      transition: all 0.2s;
    }
    .tag:hover { border-color: var(--green); color: var(--green); }
    .tag.green-tag { border-color: rgba(0,255,136,0.3); color: var(--green); background: var(--green-dim); }

    .about-content .section-title { margin-bottom: 24px; }

    .about-para {
      font-size: 15px;
      font-weight: 300;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 18px;
    }
    .about-para strong { color: var(--text); font-weight: 500; }

    .about-list {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }
    .about-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text2);
      letter-spacing: 0.04em;
    }
    .about-list li::before { content: '▸'; color: var(--green); font-size: 10px; }

    /* ─── SOCIAL ─── */
    #social { background: var(--bg); }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 48px;
    }

    .social-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 32px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .social-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent-color, var(--green));
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .social-card:hover::after { transform: scaleX(1); }
    .social-card:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateY(-4px);
    }
    .social-card.twitter { --accent-color: #1d9bf0; }
    .social-card.tiktok { --accent-color: #ff2d55; }
    .social-card.whatsapp { --accent-color: #25d366; }

    .social-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .social-card.twitter .social-icon { background: rgba(29,155,240,0.15); }
    .social-card.tiktok .social-icon { background: rgba(255,45,85,0.15); }
    .social-card.whatsapp .social-icon { background: rgba(37,211,102,0.15); }

    .social-name { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
    .social-handle { font-family: var(--font-mono); font-size: 12px; color: var(--text3); letter-spacing: 0.06em; }
    .social-desc { font-size: 14px; color: var(--text2); font-weight: 300; line-height: 1.6; flex: 1; }
    .social-cta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-color, var(--green));
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .social-cta::after { content: '→'; transition: transform 0.2s; }
    .social-card:hover .social-cta::after { transform: translateX(4px); }

    /* ─── PERFORMANCE ─── */
    #performance { background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 48px;
    }

    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-3px); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-accent, var(--green));
    }
    .stat-card:nth-child(2) { --card-accent: var(--orange); }
    .stat-card:nth-child(3) { --card-accent: #1d9bf0; }
    .stat-card:nth-child(4) { --card-accent: #9b6dff; }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 16px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      color: var(--card-accent, var(--green));
    }
    .stat-value .unit { font-size: 20px; font-weight: 600; vertical-align: super; }
    .stat-sublabel { font-size: 13px; font-weight: 300; color: var(--text2); }
    .stat-trend {
      position: absolute;
      top: 20px; right: 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
      background: var(--green-dim);
      padding: 3px 8px;
    }

    /* ─── INSIGHTS ─── */
    #insights { background: var(--bg); }

    .insights-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 48px;
    }

    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 28px;
      transition: all 0.3s;
      position: relative;
      cursor: default;
    }
    .insight-card:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateY(-4px);
    }
    .insight-card:hover .insight-icon { transform: scale(1.1); }

    .insight-icon-wrap {
      width: 52px; height: 52px;
